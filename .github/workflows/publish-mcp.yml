name: Publish to MCP Registry (manual)

# Escape hatch ONLY. Releases publish to the MCP Registry automatically via publish.yml
# (npm first, then registry — the registry validates against the published npm package).
# Use this when you need to re-push registry metadata outside a release, e.g. after a
# transient registry failure or a server.json description change.
#
# Auth is GitHub OIDC — NO secret; the id-token proves this runs in jmg698/Font-Lab,
# which grants the `io.github.jmg698/*` namespace.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp into server.json (e.g. 0.9.2). Leave empty to publish server.json as committed."
        required: false

permissions:
  id-token: write # REQUIRED for MCP Registry OIDC auth
  contents: read

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli # server.json lives here
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version (if provided)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          V="${{ github.event.inputs.version }}"; V="${V#v}"; V="${V#V}"
          jq --arg v "$V" '.version = $v | .packages[].version = $v' server.json > server.tmp
          mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
