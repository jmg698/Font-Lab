name: Publish to npm (with provenance)

# ONE release = ONE version, everywhere. Cut a GitHub Release tagged vX.Y.Z and this
# workflow does the rest:
#   1. derives the version FROM THE TAG (the single source of truth — no version strings
#      to bump in the repo; package.json / server.json are stamped here before publishing),
#   2. publishes cli/ to npm with provenance,
#   3. then (and only then) publishes the same version to the MCP Registry — the registry
#      validates against the published npm package, so ordering matters.
#
# npm auth is Trusted Publishing (OIDC) — NO token/secret. npm trusts this exact workflow
# file (jmg698/Font-Lab, publish.yml), and the provenance attestation cryptographically
# ties the package to this repo + commit. MCP Registry auth is GitHub OIDC — also no secret.
#
# Manual runs (workflow_dispatch) must supply the version explicitly.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.9.2) — required for manual runs"
        required: true
      dist_tag:
        description: "npm dist-tag to publish under"
        default: latest

permissions:
  contents: read
  id-token: write # REQUIRED for npm provenance AND MCP Registry OIDC

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      # The tag IS the version. Accept v0.9.2 / V0.9.2 / 0.9.2; fail fast (before any publish)
      # on anything that isn't STRICT semver. The core numbers reject leading zeros — a manual
      # `09.23.3` input previously slipped through the old `[0-9]+` pattern, and npm then quietly
      # "cleaned" it to 9.23.3 and tried to publish that. Catch it here with a clear message.
      - name: Derive version from tag
        run: |
          RAW="${{ github.event.inputs.version || github.event.release.tag_name }}"
          VERSION="${RAW#v}"; VERSION="${VERSION#V}"
          if ! echo "$VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)([-.][0-9A-Za-z.-]+)?$'; then
            echo "::error::'$RAW' is not a valid semver version (no leading zeros). Tag releases like v0.12.3." && exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version $VERSION"

      - uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.5.1 (needed for the OIDC publish handshake) AND is immune to
          # the Node 22.22 in-place npm-upgrade corruption (npm/cli#9151). Node 22 was the trap: its
          # bundled npm is 10.9.x, too old for the handshake.
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1 for the PUBLISH handshake. On an older npm the
      # handshake fails, the registry treats the request as anonymous, and `npm publish` dies with a
      # misleading "E404 Not Found - PUT .../font-lab" (NOT a missing package — it exists). That is
      # exactly what sank the first 0.12.3 attempt: the publish ran on the runner's bundled npm 10.9.8.
      #
      # Pin an exact npm via `npm install -g` (the mechanism that actually overrides the bundled npm —
      # `corepack prepare npm@…` does NOT: it left `npm -v` on 10.9.8). Do NOT float to @latest: on
      # 2026-07-09 that pulled the day-old npm 12.0.0, whose in-place self-upgrade corrupted the bundled
      # deps so `--provenance` couldn't require 'sigstore' (npm/cli#9151, #9526). Bump this deliberately.
      - name: Pin npm (OIDC-capable, provenance-capable)
        run: npm install -g npm@11.18.0
      # Assert the pin took — never silently regress to a version that would 404 at publish time.
      - name: Verify npm >= 11.5.1 (OIDC trusted publishing)
        run: |
          NPM_V="$(npm -v)"; MIN="11.5.1"
          echo "npm $NPM_V"
          if [ "$(printf '%s\n%s\n' "$MIN" "$NPM_V" | sort -V | head -n1)" != "$MIN" ]; then
            echo "::error::npm $NPM_V < $MIN — OIDC trusted publishing would fail with a misleading E404." && exit 1
          fi
          echo "npm $NPM_V satisfies >= $MIN ✓"

      # Stamp the tag's version into package.json — the repo copy is a dev placeholder.
      - name: Stamp version
        run: npm pkg set version="$VERSION"

      # Install prod deps and run the gates so we never publish a broken build.
      - run: npm install --omit=dev --no-audit --no-fund
      - run: node codegen-css-test.mjs
      - run: node panel-keys-test.mjs
      - run: bash run-m5.sh

      # No token: npm authenticates via the OIDC id-token (Trusted Publishing) and attaches
      # provenance automatically. The package page then shows it was built + signed on GitHub
      # Actions from jmg698/Font-Lab at the exact commit.
      - run: npm publish --provenance --access public --tag "${{ github.event.inputs.dist_tag || 'latest' }}"

  publish-mcp-registry:
    needs: publish-npm # registry validates the npm package — it must exist first
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          RAW="${{ github.event.inputs.version || github.event.release.tag_name }}"
          VERSION="${RAW#v}"; VERSION="${VERSION#V}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # Stamp the same version into server.json (top-level + the npm package entry).
      - name: Stamp version
        run: |
          jq --arg v "$VERSION" '.version = $v | .packages[].version = $v' server.json > server.tmp
          mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
